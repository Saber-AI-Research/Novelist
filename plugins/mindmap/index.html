<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mindmap Plugin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg, #fcfcfa); }
    .panel { display: flex; flex-direction: column; height: 100%; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border, #e8e6e1);
    }
    .title {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-secondary, #8a8a8a);
    }
    .fit-btn {
      display: flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border: none; border-radius: 4px;
      background: transparent; color: var(--text-secondary, #8a8a8a); cursor: pointer;
    }
    .fit-btn:hover { background: var(--bg-secondary, #f4f3ef); color: var(--text, #2c2c2c); }
    .content { flex: 1; min-height: 0; overflow: hidden; }
    svg { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <span class="title">MAP</span>
      <button class="fit-btn" id="fit-btn" title="Fit to view">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="1"/><path d="M2 6h12M6 2v12"/></svg>
      </button>
    </div>
    <div class="content">
      <svg id="mindmap-svg"></svg>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
