name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Self-hosted macOS ARM build (M1/M2) ───────────────
  build-macos-arm:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Install frontend dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test && cd core && cargo test

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Create styled DMG
        if: always()
        continue-on-error: true
        run: |
          APP="core/target/release/bundle/macos/Novelist.app"
          DMG="core/target/release/bundle/dmg/Novelist_${{ github.ref_name }}_aarch64.dmg"
          if [ ! -f "$DMG" ]; then
            bash scripts/create-dmg.sh "$APP" "$DMG"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: novelist-macos-aarch64
          path: |
            core/target/release/bundle/dmg/*.dmg
            core/target/release/bundle/macos/*.app.tar.gz
            core/target/release/bundle/macos/*.app.tar.gz.sig

  # ── GitHub-hosted builds (Intel Mac, Linux, Windows) ──
  build-other:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test && cd core && cargo test

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: core
          tagName: ${{ github.ref_name }}
          releaseName: 'Novelist ${{ github.ref_name }}'
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

  # ── Create GitHub Release with ARM artifacts + updater JSON ──
  release:
    needs: [build-macos-arm, build-other]
    runs-on: ubuntu-latest
    if: ${{ needs.build-macos-arm.result == 'success' || needs.build-other.result == 'success' }}
    steps:
      - name: Download macOS ARM artifact
        uses: actions/download-artifact@v4
        with:
          name: novelist-macos-aarch64
          path: artifacts/
        continue-on-error: true

      - name: Upload ARM DMG + updater files to Release
        if: hashFiles('artifacts/**/*.dmg') != '' || hashFiles('artifacts/**/*.tar.gz') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sig
          tag_name: ${{ github.ref_name }}
