name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Self-hosted macOS ARM build (M1/M2) ───────────────
  build-macos-arm:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Install frontend dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test && cd src-tauri && cargo test

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Create styled DMG
        if: always()
        run: |
          APP="src-tauri/target/release/bundle/macos/Novelist.app"
          DMG="src-tauri/target/release/bundle/dmg/Novelist_${{ github.ref_name }}_aarch64.dmg"
          if [ ! -f "$DMG" ]; then
            bash scripts/create-dmg.sh "$APP" "$DMG"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: novelist-macos-aarch64
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

  # ── GitHub-hosted builds (Intel Mac, Linux, Windows) ──
  build-other:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-13        # Intel
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '${{ github.ref_name }}'
          releaseBody: |
            See the [README](https://github.com/${{ github.repository }}#readme) for details.
          releaseDraft: false
          prerelease: false

  # ── Create GitHub Release with all artifacts ──────────
  release:
    needs: [build-macos-arm, build-other]
    runs-on: ubuntu-latest
    if: ${{ needs.build-macos-arm.result == 'success' || needs.build-other.result == 'success' }}
    steps:
      - name: Download macOS ARM artifact
        uses: actions/download-artifact@v4
        with:
          name: novelist-macos-aarch64
          path: artifacts/
        continue-on-error: true

      - name: Upload to Release
        if: hashFiles('artifacts/**/*.dmg') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.dmg
          tag_name: ${{ github.ref_name }}
